# fly.toml
app = "cenergia-mski"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/_stcore/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
